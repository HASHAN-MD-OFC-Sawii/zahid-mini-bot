<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 HASHU-MD CONNECT 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #020204; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #ffffff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; position: relative; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium Vercel Glass Look */
        .luxury-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
            border-radius: 2.5rem;
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            position: relative;
            overflow: hidden;
        }

        /* Animated Smooth Gradient Borders for Interactive Fields */
        .neon-input-container {
            position: relative;
            border-radius: 1.25rem;
            padding: 1px;
            background: linear-gradient(90deg, rgba(123,44,191,0.3), rgba(0,245,255,0.3));
            transition: all 0.4s ease;
        }
        .neon-input-container:focus-within {
            background: linear-gradient(90deg, #7B2CBF, #00F5FF);
            box-shadow: 0 0 25px rgba(0,245,255,0.15);
        }

        .btn-premium {
            background: linear-gradient(135deg, #7B2CBF, #4A148C);
            box-shadow: 0 10px 30px rgba(123,44,191,0.25);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(123,44,191,0.4);
            filter: brightness(1.1);
        }
        .btn-premium:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Result Code Glow Display */
        .code-display-box {
            background: rgba(0, 245, 255, 0.02);
            border: 1px dashed rgba(0, 245, 255, 0.25);
            box-shadow: inset 0 0 20px rgba(0,245,255,0.02);
            transition: all 0.3s ease;
        }

        /* Toast notification trigger animation */
        .toast-notify {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notify.active { top: 24px; }
    </style>
</head>
<body>

    <div id="copyToast" class="toast-notify px-6 py-3 rounded-full text-xs font-bold tracking-wide text-cyan-400 z-50 flex items-center gap-2">
        <span class="w-2 h-2 bg-cyan-400 rounded-full animate-ping"></span> SUCCESS: PAIR CODE COPIED!
    </div>

    <div class="absolute w-[400px] h-[400px] bg-purple-600/5 rounded-full blur-[120px] -top-20 -left-20 pointer-events-none"></div>
    <div class="absolute w-[400px] h-[400px] bg-cyan-500/5 rounded-full blur-[120px] -bottom-20 -right-20 pointer-events-none"></div>

    <div class="luxury-card text-center border-white/5 mx-4">
        <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-cyan-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-2xl text-3xl font-black tracking-tighter">H</div>
        
        <h1 class="text-2xl font-extrabold tracking-tight bg-gradient-to-b from-white to-zinc-400 bg-clip-text text-transparent">HASHU-MD INSTANCE</h1>
        <p class="text-[10px] uppercase font-bold tracking-[0.2em] text-cyan-400/80 mt-1 mb-8">Pair Code Sync Hub</p>

        <div class="space-y-4 text-left">
            <label class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold ml-1">Enter WhatsApp Number</label>
            <div class="neon-input-container">
                <input type="text" id="number" placeholder="e.g. 9477xxxxxxx" class="w-full bg-black/60 text-white outline-none px-5 py-4 rounded-[1.2rem] text-center font-semibold tracking-wide placeholder-zinc-700 text-sm">
            </div>
            
            <button onclick="getPairCode()" class="btn-premium w-full text-white font-bold text-sm py-4 rounded-2xl tracking-wide uppercase select-none mt-2">
                Generate Verification Code
            </button>
        </div>

        <div id="borderBox" class="hidden mt-6 animate-fadeIn">
            <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold mb-2">Your Device Pair Code</p>
            <div onclick="copyPairToClipboard()" id="codeBox" class="code-display-box w-full py-4 rounded-2xl text-center font-bold text-xl tracking-[6px] text-white mono cursor-pointer select-none active:scale-98 transition">
                ----
            </div>
            <p class="text-[9px] text-zinc-500 font-medium mt-2">Click code block above to instantly copy.</p>
        </div>

        <div class="mt-8 pt-6 border-t border-white/5 space-y-1 text-center">
            <p class="text-[10px] font-bold tracking-wider text-zinc-400 uppercase">WHATSAPP AUTOMATION BOT</p>
            <p class="text-[9px] text-zinc-600 font-semibold uppercase tracking-widest">Powered by Mr Hashuu Official</p>
            <p class="text-[8px] tracking-widest text-purple-400/50 font-bold uppercase mt-1">Dark Cyber Leaderz Engine</p>
        </div>
    </div>

    <script>
        async function getPairCode() {
            // Clean up numbers input structure
            const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
            const codeBox = document.getElementById("codeBox");
            const borderBox = document.getElementById("borderBox");

            if (!num) {
                borderBox.classList.remove("hidden");
                codeBox.style.letterSpacing = "normal";
                codeBox.className = "w-full py-4 rounded-2xl text-center font-bold text-xs border border-red-500/20 bg-red-500/5 text-red-400 mono";
                codeBox.innerText = "PLEASE PROVIDE A VALID NUMBER";
                return;
            }

            // Trigger Loading state frame
            borderBox.classList.remove("hidden");
            codeBox.style.letterSpacing = "normal";
            codeBox.className = "code-display-box w-full py-4 rounded-2xl text-center font-bold text-xs text-zinc-400 mono animate-pulse";
            codeBox.innerText = "GENERATING SYSTEM PAIR...";

            try {
                const res = await fetch(`/code?number=${num}`);
                const data = await res.json();
                
                // Switch classes back to standard premium glow style upon loading complete
                codeBox.className = "code-display-box w-full py-4 rounded-2xl text-center font-bold text-xl tracking-[6px] text-cyan-400 mono cursor-pointer shadow-lg shadow-cyan-500/5";
                
                if (data.code) {
                    codeBox.style.letterSpacing = "6px";
                    codeBox.innerText = data.code;
                } else {
                    codeBox.style.letterSpacing = "normal";
                    codeBox.className = "w-full py-4 rounded-2xl text-center font-bold text-xs border border-red-500/20 bg-red-500/5 text-red-400 mono";
                    codeBox.innerText = "SERVER RESOURCE FULL";
                }
            } catch (e) {
                codeBox.style.letterSpacing = "normal";
                codeBox.className = "w-full py-4 rounded-2xl text-center font-bold text-xs border border-red-500/20 bg-red-500/5 text-red-400 mono";
                codeBox.innerText = "SERVER CONNECTION IS TIMEOUT";
            }
        }

        function copyPairToClipboard() {
            const codeText = document.getElementById("codeBox").innerText;
            
            // Validation block to avoid copying error messages
            if(codeText.includes("PLEASE") || codeText.includes("GENERATING") || codeText.includes("SERVER")) return;

            navigator.clipboard.writeText(codeText);
            const toast = document.getElementById("copyToast");
            
            // Show Apple-style Top Toast overlay
            toast.classList.add("active");
            setTimeout(() => {
                toast.classList.remove("active");
            }, 2500);
        }
    </script>
</body>
</html>
