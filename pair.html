<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 HASHU-MD INFINITE GATEWAY 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #010103; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Absolute Mobile Screen Height/Width Fit Tuning */
        html, body { 
            background: var(--bg); 
            color: #ffffff; 
            width: 100%;
            height: 100%;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative; 
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Fully Micro-Responsive Card Structure */
        .luxury-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.03);
            border-radius: 2rem;
            width: 92%;
            max-width: 380px;
            padding: 28px 22px;
            position: relative;
            z-index: 10;
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.97) translateY(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .neon-box-container {
            position: relative;
            border-radius: 1rem;
            padding: 1px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.35s ease;
        }
        .neon-box-container:focus-within {
            background: linear-gradient(90deg, #7B2CBF, #00F5FF);
            box-shadow: 0 0 25px rgba(0,245,255,0.12);
        }

        .btn-premium {
            background: linear-gradient(135deg, #7B2CBF, #52189C);
            box-shadow: 0 10px 25px rgba(123,44,191,0.15);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-premium:active { transform: scale(0.98); filter: brightness(0.9); }

        .code-display-box {
            background: rgba(0, 245, 255, 0.01);
            border: 1px dashed rgba(0, 245, 255, 0.2);
            transition: all 0.25s ease;
        }

        .toast-notify {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notify.active { top: 16px; }

        .custom-select-arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #555;
            font-size: 9px;
        }
    </style>
</head>
<body>

    <div id="copyToast" class="toast-notify px-5 py-2.5 rounded-full text-[11px] font-bold tracking-wide text-cyan-400 z-50 flex items-center gap-2 select-none">
        <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-ping"></span> COPIED TO CLIPBOARD!
    </div>

    <div class="absolute w-[300px] h-[300px] bg-purple-600/5 rounded-full blur-[100px] top-0 left-0 pointer-events-none"></div>
    <div class="absolute w-[300px] h-[300px] bg-cyan-500/5 rounded-full blur-[100px] bottom-0 right-0 pointer-events-none"></div>

    <div class="luxury-card text-center border-white/5">
        <div class="w-12 h-12 bg-gradient-to-br from-purple-600 to-cyan-500 rounded-2xl mx-auto mb-3.5 flex items-center justify-center shadow-lg text-xl font-black">H</div>
        
        <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-b from-white to-zinc-400 bg-clip-text text-transparent">HASHU-MD CLUSTER</h1>
        <p class="text-[9px] uppercase font-bold tracking-[0.25em] text-purple-400/80 mt-0.5 mb-5">Infinite Auto-Scale Core</p>

        <div class="space-y-3.5 text-left">
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold ml-1 block mb-1.5">WhatsApp Number</label>
                <div class="neon-box-container">
                    <input type="text" id="number" placeholder="e.g. 9477xxxxxxx" class="w-full bg-black/80 text-white outline-none px-4 py-3 rounded-[0.9rem] text-center font-semibold tracking-wide placeholder-zinc-800 text-sm">
                </div>
            </div>

            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold ml-1 block mb-1.5">Select Active Server</label>
                <div class="neon-box-container relative">
                    <select id="serverSelect" class="w-full bg-black/80 text-zinc-300 outline-none px-4 py-3 rounded-[0.9rem] font-semibold text-xs cursor-pointer appearance-none pr-10">
                        <option value="none" selected disabled>SELECT SERVER</option>
                        <option value="1" id="opt-s1">SERVER 01 - FRANKFURT (MAX 10)</option>
                        <option value="2" id="opt-s2">SERVER 02 - SINGAPORE (MAX 20)</option>
                        <option value="3" id="opt-s3">SERVER 03 - OREGON (MAX 30)</option>
                    </select>
                    <div class="custom-select-arrow">▼</div>
                </div>
            </div>
            
            <button onclick="getPairCode()" class="btn-premium w-full text-white font-bold text-xs py-3.5 rounded-xl tracking-wider uppercase select-none mt-1">
                Request Key Block
            </button>
        </div>

        <div id="borderBox" class="hidden mt-4.5">
            <p class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold mb-1">Status Output</p>
            <div onclick="copyPairToClipboard()" id="codeBox" class="code-display-box w-full py-3 rounded-xl text-center font-bold text-base tracking-[5px] text-white mono cursor-pointer select-none active:scale-98 transition">
                ----
            </div>
            <p id="helperLabel" class="text-[8px] text-zinc-500 font-medium mt-1">Tap layout block above to copy code.</p>
        </div>

        <div class="mt-5 pt-4 border-t border-white/5 text-left">
            <div class="flex items-center justify-between mb-2.5">
                <span class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Network Core Matrix</span>
                <span class="flex h-1.5 w-1.5 relative">
                    <span id="statusPulse" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span id="statusDot" class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span>
                </span>
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <div class="bg-white/[0.005] border border-white/5 rounded-xl p-2.5">
                    <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-wider">Total Active Bots</p>
                    <p class="text-base font-extrabold text-white mt-0.5 mono" id="activeBotsCounter">SYNC...</p>
                </div>
                <div class="bg-white/[0.005] border border-white/5 rounded-xl p-2.5">
                    <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-wider">Cluster Ping</p>
                    <p class="text-base font-extrabold text-emerald-400 mt-0.5 mono" id="pingValue">--</p>
                </div>
            </div>
        </div>

        <div class="mt-5 pt-1 space-y-0.5 text-center">
            <p class="text-[8px] text-zinc-600 font-semibold uppercase tracking-widest">Powered by Mr Hashuu Official</p>
            <p class="text-[7px] tracking-widest text-purple-400/30 font-bold uppercase">Infinite Hyper-Scale Core</p>
        </div>
    </div>

    <script>
        let currentGlobalBotCount = 0; // State memory for current active route capacity

        // Network Fetching Engine linking directly to /active route channel
        async function fetchActiveBots() {
            const botCounter = document.getElementById('activeBotsCounter');
            const pingValue = document.getElementById('pingValue');
            const dropdown = document.getElementById('serverSelect');
            const startTime = Date.now();

            try {
                const res = await fetch('/active');
                const data = await res.json();
                const latency = Date.now() - startTime;

                pingValue.innerText = latency + 'ms';

                // Parsing exact counts directly from real route parameters
                if (data && data.count !== undefined) currentGlobalBotCount = Number(data.count);
                else if (data && data.total !== undefined) currentGlobalBotCount = Number(data.total);
                else if (typeof data === 'number') currentGlobalBotCount = data;
                else currentGlobalBotCount = 0;

                botCounter.innerText = currentGlobalBotCount.toLocaleString();

                // Dynamic UI Updating Server Capacity Text on Option Tags
                document.getElementById('opt-s1').innerText = `SERVER 01 - FRANKFURT (${currentGlobalBotCount}/10)${currentGlobalBotCount >= 10 ? ' [FULL]' : ''}`;
                document.getElementById('opt-s2').innerText = `SERVER 02 - SINGAPORE (${currentGlobalBotCount}/20)${currentGlobalBotCount >= 20 ? ' [FULL]' : ''}`;
                document.getElementById('opt-s3').innerText = `SERVER 03 - OREGON (${currentGlobalBotCount}/30)${currentGlobalBotCount >= 30 ? ' [FULL]' : ''}`;

                // CRITICAL LOGIC: If total bots count exceeds 30, trigger auto extra server generation!
                if (currentGlobalBotCount > 30 && !document.getElementById('opt-s4')) {
                    const newServerOpt = document.createElement('option');
                    newServerOpt.value = "4";
                    newServerOpt.id = "opt-s4";
                    newServerOpt.className = "text-cyan-400 font-bold";
                    newServerOpt.innerText = `SERVER 04 - AUTO SCALED CORE (ONLINE)`;
                    dropdown.appendChild(newServerOpt);
                }

            } catch (error) {
                botCounter.innerText = "OFFLINE";
                pingValue.innerText = "TIMEOUT";
            }
        }

        fetchActiveBots();
        setInterval(fetchActiveBots, 5000); // Continuous health sync checking

        async function getPairCode() {
            const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
            const codeBox = document.getElementById("codeBox");
            const borderBox = document.getElementById("borderBox");
            const helperLabel = document.getElementById("helperLabel");
            const selectedServer = document.getElementById("serverSelect").value;

            if (!num) {
                showSystemAlert("ENTER WHATSAPP NUMBER CORRECTLY");
                return;
            }

            if (selectedServer === "none") {
                showSystemAlert("PLEASE SELECT A CLOUD SERVER");
                return;
            }

            // CRITICAL HARD BACKEND ENFORCEMENT CAPACITY CHECKS
            if (selectedServer === "1" && currentGlobalBotCount >= 10) {
                showSystemAlert("SERVER IS FULL (MAX 10 BOTS REACHED)");
                return;
            }
            if (selectedServer === "2" && currentGlobalBotCount >= 20) {
                showSystemAlert("SERVER IS FULL (MAX 20 BOTS REACHED)");
                return;
            }
            if (selectedServer === "3" && currentGlobalBotCount >= 30) {
                showSystemAlert("SERVER IS FULL (MAX 30 BOTS REACHED)");
                return;
            }

            // Connection Sequence Processing Phase
            borderBox.classList.remove("hidden");
            codeBox.style.letterSpacing = "normal";
            helperLabel.className = "hidden";
            codeBox.className = "code-display-box w-full py-3 rounded-xl text-center font-bold text-[10px] text-purple-400 mono animate-pulse";
            codeBox.innerText = `ALLOCATING INSTANCE CORE 0${selectedServer}...`;

            try {
                const res = await fetch(`/code?number=${num}&server=${selectedServer}`);
                const data = await res.json();
                
                if (data.code) {
                    codeBox.className = "code-display-box w-full py-3 rounded-xl text-center font-bold text-lg tracking-[5px] text-cyan-400 mono cursor-pointer shadow-lg shadow-cyan-500/5";
                    codeBox.style.letterSpacing = "5px";
                    codeBox.innerText = data.code;
                    helperLabel.className = "text-[8px] text-zinc-500 font-medium mt-1";
                    helperLabel.innerText = "Tap layout block above to copy code.";
                } else {
                    showSystemAlert(`SERVER 0${selectedServer} LOAD CAPACITY EXCEEDED`);
                }
            } catch (e) {
                showSystemAlert(`SERVER 0${selectedServer} NODE CONNECTION TIMEOUT`);
            }
        }

        function showSystemAlert(message) {
            const borderBox = document.getElementById("borderBox");
            const codeBox = document.getElementById("codeBox");
            const helperLabel = document.getElementById("helperLabel");

            borderBox.classList.remove("hidden");
            codeBox.style.letterSpacing = "normal";
            helperLabel.className = "hidden";
            codeBox.className = "w-full py-3 rounded-xl text-center font-bold text-[9px] border border-red-500/20 bg-red-500/5 text-red-400 mono";
            codeBox.innerText = message;
        }

        function copyPairToClipboard() {
            const codeText = document.getElementById("codeBox").innerText;
            if(codeText.includes("ENTER") || codeText.includes("SELECT") || codeText.includes("ALLOCATING") || codeText.includes("SERVER")) return;

            navigator.clipboard.writeText(codeText);
            const toast = document.getElementById("copyToast");
            
            toast.classList.add("active");
            setTimeout(() => { toast.classList.remove("active"); }, 2200);
        }
    </script>
</body>
    </html>
