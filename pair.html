<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 HASHU-MD LIVE GATEWAY 👑</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #020204; }
        * { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Strict Mobile Viewport Scale Fixes */
        html, body { 
            background: var(--bg); 
            color: #ffffff; 
            width: 100%;
            height: 100%;
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            position: relative; 
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Full Frame Responsive Vercel Card Look */
        .luxury-card {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.03);
            border-radius: 2rem;
            width: 92%;
            max-width: 390px;
            padding: 32px 24px;
            position: relative;
            z-index: 10;
            transform: scale(1);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            0% { opacity: 0; transform: scale(0.96) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Animated Elegant Focus Field Borders */
        .neon-box-container {
            position: relative;
            border-radius: 1rem;
            padding: 1px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .neon-box-container:focus-within {
            background: linear-gradient(90deg, #7B2CBF, #00F5FF);
            box-shadow: 0 0 25px rgba(0,245,255,0.12);
        }

        .btn-premium {
            background: linear-gradient(135deg, #7B2CBF, #52189C);
            box-shadow: 0 10px 25px rgba(123,44,191,0.2);
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-premium:active {
            transform: scale(0.98);
            filter: brightness(0.9);
        }

        .code-display-box {
            background: rgba(0, 245, 255, 0.01);
            border: 1px dashed rgba(0, 245, 255, 0.2);
            transition: all 0.3s ease;
        }

        /* Apple Push Notification Animation */
        .toast-notify {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-notify.active { top: 20px; }

        /* Custom Dropdown Arrow Fix */
        .custom-select-arrow {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #666;
            font-size: 10px;
        }
    </style>
</head>
<body>

    <div id="copyToast" class="toast-notify px-5 py-3 rounded-full text-[11px] font-bold tracking-wide text-cyan-400 z-50 flex items-center gap-2 select-none">
        <span class="w-1.5 h-1.5 bg-cyan-400 rounded-full animate-ping"></span> PAIR CODE COPIED!
    </div>

    <div class="absolute w-[320px] h-[320px] bg-purple-600/5 rounded-full blur-[100px] top-0 left-0 pointer-events-none"></div>
    <div class="absolute w-[320px] h-[320px] bg-cyan-500/5 rounded-full blur-[100px] bottom-0 right-0 pointer-events-none"></div>

    <div class="luxury-card text-center border-white/5">
        <div class="w-14 h-14 bg-gradient-to-br from-purple-600 to-cyan-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-xl text-2xl font-black">H</div>
        
        <h1 class="text-xl font-extrabold tracking-tight bg-gradient-to-b from-white to-zinc-400 bg-clip-text text-transparent">HASHU-MD INSTANCE</h1>
        <p class="text-[9px] uppercase font-bold tracking-[0.25em] text-purple-400/80 mt-1 mb-6">Verification & Analytics</p>

        <div class="space-y-3.5 text-left">
            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold ml-1 block mb-1.5">WhatsApp Number</label>
                <div class="neon-box-container">
                    <input type="text" id="number" placeholder="e.g. 9477xxxxxxx" class="w-full bg-black/80 text-white outline-none px-4 py-3.5 rounded-[0.95rem] text-center font-semibold tracking-wide placeholder-zinc-800 text-sm">
                </div>
            </div>

            <div>
                <label class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold ml-1 block mb-1.5">Target Cloud Server</label>
                <div class="neon-box-container relative">
                    <select id="serverSelect" class="w-full bg-black/80 text-zinc-400 outline-none px-4 py-3.5 rounded-[0.95rem] font-semibold text-sm cursor-pointer appearance-none pr-10">
                        <option value="none" selected disabled>SELECT SERVER</option>
                        <option value="1">SERVER 01 - FRANKFURT CORE</option>
                        <option value="2">SERVER 02 - SINGAPORE NODE</option>
                        <option value="3">SERVER 03 - OREGON BACKUP</option>
                    </select>
                    <div class="custom-select-arrow">▼</div>
                </div>
            </div>
            
            <button onclick="getPairCode()" class="btn-premium w-full text-white font-bold text-xs py-3.5 rounded-xl tracking-wider uppercase select-none mt-2">
                Request Pair Key
            </button>
        </div>

        <div id="borderBox" class="hidden mt-5">
            <p class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold mb-1.5">Generated Pair Code</p>
            <div onclick="copyPairToClipboard()" id="codeBox" class="code-display-box w-full py-3.5 rounded-xl text-center font-bold text-lg tracking-[5px] text-white mono cursor-pointer select-none active:scale-98 transition">
                ----
            </div>
            <p class="text-[8px] text-zinc-500 font-medium mt-1.5">Tap box structure above to instantly copy code.</p>
        </div>

        <div class="mt-6 pt-5 border-t border-white/5 text-left">
            <div class="flex items-center justify-between mb-3">
                <span class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Network Telemetry</span>
                <span class="flex h-1.5 w-1.5 relative">
                    <span id="statusPulse" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span id="statusDot" class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span>
                </span>
            </div>
            
            <div class="grid grid-cols-2 gap-2.5">
                <div class="bg-white/[0.01] border border-white/5 rounded-xl p-2.5">
                    <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-wider">Active Bots</p>
                    <p class="text-base font-extrabold text-white mt-0.5 mono" id="activeBotsCounter">SYNCING...</p>
                </div>
                <div class="bg-white/[0.01] border border-white/5 rounded-xl p-2.5">
                    <p class="text-[8px] font-bold text-zinc-500 uppercase tracking-wider">Latency</p>
                    <p class="text-base font-extrabold text-emerald-400 mt-0.5 mono" id="pingValue">--</p>
                </div>
            </div>
        </div>

        <div class="mt-6 pt-3 space-y-0.5 text-center">
            <p class="text-[8px] text-zinc-600 font-semibold uppercase tracking-widest">Powered by Mr Hashuu Official</p>
            <p class="text-[7px] tracking-widest text-purple-400/40 font-bold uppercase">Dark Cyber Leaderz Engine</p>
        </div>
    </div>

    <script>
        // Fetch endpoint streaming linking straight to live /active api metrics route
        async function fetchActiveBots() {
            const botCounter = document.getElementById('activeBotsCounter');
            const pingValue = document.getElementById('pingValue');
            const pulse = document.getElementById('statusPulse');
            const dot = document.getElementById('statusDot');
            const startTime = Date.now();

            try {
                const res = await fetch('/active');
                const data = await res.json();
                const latency = Date.now() - startTime;

                pingValue.innerText = latency + 'ms';
                pingValue.className = latency > 300 ? "text-base font-extrabold text-amber-400 mt-0.5 mono" : "text-base font-extrabold text-emerald-400 mt-0.5 mono";

                if (data && data.count !== undefined) botCounter.innerText = Number(data.count).toLocaleString();
                else if (data && data.total !== undefined) botCounter.innerText = Number(data.total).toLocaleString();
                else if (typeof data === 'number') botCounter.innerText = data.toLocaleString();
                else botCounter.innerText = "ONLINE";

                pulse.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75";
                dot.className = "relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500";
            } catch (error) {
                botCounter.innerText = "OFFLINE";
                pingValue.innerText = "TIMEOUT";
                pingValue.className = "text-base font-extrabold text-red-500 mt-0.5 mono";
                pulse.className = "hidden";
                dot.className = "relative inline-flex rounded-full h-1.5 w-1.5 bg-red-500";
            }
        }

        fetchActiveBots();
        setInterval(fetchActiveBots, 6000);

        async function getPairCode() {
            const num = document.getElementById("number").value.replace(/[^0-9]/g, '');
            const codeBox = document.getElementById("codeBox");
            const borderBox = document.getElementById("borderBox");
            const selectedServer = document.getElementById("serverSelect").value;

            // Enforcement Condition 1: Check if Number Field is Empty
            if (!num) {
                borderBox.classList.remove("hidden");
                codeBox.style.letterSpacing = "normal";
                codeBox.className = "w-full py-3.5 rounded-xl text-center font-bold text-[10px] border border-red-500/20 bg-red-500/5 text-red-400 mono";
                codeBox.innerText = "ENTER WHATSAPP NUMBER CORRECTLY";
                return;
            }

            // Enforcement Condition 2: Absolute Required Server Selector Validation
            if (selectedServer === "none") {
                borderBox.classList.remove("hidden");
                codeBox.style.letterSpacing = "normal";
                codeBox.className = "w-full py-3.5 rounded-xl text-center font-bold text-[10px] border border-red-500/20 bg-red-500/5 text-red-400 mono";
                codeBox.innerText = "PLEASE SELECT A VALID CLOUD SERVER";
                return;
            }

            // Toggle Visual Connection State Animations
            borderBox.classList.remove("hidden");
            codeBox.style.letterSpacing = "normal";
            codeBox.className = "code-display-box w-full py-3.5 rounded-xl text-center font-bold text-[10px] text-purple-400 mono animate-pulse";
            codeBox.innerText = `CONNECTING SERVER 0${selectedServer}...`;

            try {
                // Fetch Request with Number + Explicit Server Selection Query
                const res = await fetch(`/code?number=${num}&server=${selectedServer}`);
                const data = await res.json();
                
                if (data.code) {
                    codeBox.className = "code-display-box w-full py-3.5 rounded-xl text-center font-bold text-lg tracking-[5px] text-cyan-400 mono cursor-pointer shadow-lg shadow-cyan-500/5";
                    codeBox.style.letterSpacing = "5px";
                    codeBox.innerText = data.code;
                } else {
                    codeBox.style.letterSpacing = "normal";
                    codeBox.className = "w-full py-3.5 rounded-xl text-center font-bold text-[10px] border border-red-500/20 bg-red-500/5 text-red-400 mono";
                    codeBox.innerText = `SERVER 0${selectedServer} INTERNAL FULL`;
                }
            } catch (e) {
                codeBox.style.letterSpacing = "normal";
                codeBox.className = "w-full py-3.5 rounded-xl text-center font-bold text-[10px] border border-red-500/20 bg-red-500/5 text-red-400 mono";
                codeBox.innerText = `SERVER 0${selectedServer} CONNECT REJECTED`;
            }
        }

        function copyPairToClipboard() {
            const codeText = document.getElementById("codeBox").innerText;
            if(codeText.includes("ENTER") || codeText.includes("SELECT") || codeText.includes("CONNECTING") || codeText.includes("SERVER")) return;

            navigator.clipboard.writeText(codeText);
            const toast = document.getElementById("copyToast");
            
            toast.classList.add("active");
            setTimeout(() => { toast.classList.remove("active"); }, 2200);
        }
    </script>
</body>
    </html>
